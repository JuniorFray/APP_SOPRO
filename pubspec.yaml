name: sopro
description: "O sussurro certo. No lugar certo."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1

  # Banco de dados local criptografado
  drift: ^2.22.1
  drift_flutter: 0.2.1

  # Necessario para localizar o diretorio do banco no dispositivo
  path_provider: ^2.1.5
  # Manipulacao de caminhos de arquivo (usado em sopro_database.dart)
  path: ^1.9.0

  # Geracao de UUIDs para IDs das entidades
  uuid: ^4.5.1

  # Armazena preferências simples (flag onboarding_done) sem banco de dados
  shared_preferences: ^2.3.0

  # Mapa interativo (OpenStreetMap, sem API key) para seleção de local
  flutter_map: ^7.0.1

  # Tipos geográficos e cálculo de distância entre coordenadas
  latlong2: ^0.9.1

  # geolocator removido temporariamente: v13.x incompatível com Android SDK 36,
  # v14.x requer Dart 3.10+ (atual: 3.5.4). GPS real integrado no Sprint 5
  # junto com flutter_background_service e upgrade do Flutter SDK.

  # Notificações locais (disparo de triggers ao entrar no geofence)
  flutter_local_notifications: ^18.0.1

  # Foreground service que mantém o processo vivo quando o app é minimizado,
  # permitindo que o GPS e o geofencing continuem funcionando em segundo plano.
  flutter_background_service: ^5.0.0

  # BLE Social: implementado 100% via MethodChannel + EventChannel nativo (MainActivity.kt).
  # flutter_blue_plus removido: flutter_blue_plus_android 9.0.3 incompatível com Flutter 3.24.5.
  # Scan via EventChannel "com.sopro.sopro/ble_scan", GATT via MethodChannel "com.sopro.sopro/ble".

  # Seleção de foto de perfil da galeria do dispositivo
  image_picker: ^1.1.2

  # Abre URLs externas (WhatsApp, browser) a partir do app
  url_launcher: ^6.3.0

  # Gravação de áudio para envio ao Gemini Audio API (Sprint V2-GeminiAudio)
  # Substitui speech_to_text — o Gemini faz STT + NLU em uma única chamada
  # Fixado em 5.1.2: 5.2.x introduz startStream na platform interface mas
  # record_linux 0.7.2 não implementa, quebrando a compilação Dart mesmo no Android
  record: 5.1.2

  # Síntese de voz on-device em português (Sprint V2-Voz)
  # v3.x compatível com Kotlin 1.8.22 e compileSdk 35 do projeto
  flutter_tts: ^3.6.3

  # Carrega variáveis de ambiente do arquivo .env em runtime
  # Usado para a chave Gemini — nunca hardcode de secrets no fonte
  flutter_dotenv: ^5.2.1

  # Agenda tarefas Dart em background via WorkManager (Android).
  # Usado pelo FloatingVoiceService para persistir envs/triggers via Drift
  # sem abrir o app — evita o problema de cache WAL do SQLite direto.
  workmanager: ^0.5.1

dependency_overrides:
  # record_platform_interface >=1.3.0 torna startStream ABSTRATO; record_linux 0.7.2
  # nao implementa, quebrando compilacao Dart (mesmo em build Android).
  # 1.2.0 tem startStream com default UnimplementedError — subclasses nao precisam
  # implementar, corrigindo o build sem alterar comportamento no Android.
  record_platform_interface: '>=1.1.0 <1.3.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Gerador de codigo do Drift (tabelas, DAOs, etc.)
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

  # Gerador do ícone do app para Android (executa via 'dart run flutter_launcher_icons')
  flutter_launcher_icons: ^0.14.4

# Configuração do gerador de ícones.
# adaptive_icon_background + adaptive_icon_foreground geram o ícone adaptativo
# (Android 8.0+ / API 26+) que preenche todo o espaço disponível no launcher —
# sem a moldura cinza do ícone legado. image_path serve de fallback para API < 26.
flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/icon/
    - .env