name: sopro
description: "O sussurro certo. No lugar certo."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1

  # Banco de dados local criptografado
  drift: ^2.22.1
  drift_flutter: 0.2.1

  # Necessario para localizar o diretorio do banco no dispositivo
  path_provider: ^2.1.5

  # Geracao de UUIDs para IDs das entidades
  uuid: ^4.5.1

  # Armazena preferências simples (flag onboarding_done) sem banco de dados
  shared_preferences: ^2.3.0

  # Mapa interativo (OpenStreetMap, sem API key) para seleção de local
  flutter_map: ^7.0.1

  # Tipos geográficos e cálculo de distância entre coordenadas
  latlong2: ^0.9.1

  # geolocator removido temporariamente: v13.x incompatível com Android SDK 36,
  # v14.x requer Dart 3.10+ (atual: 3.5.4). GPS real integrado no Sprint 5
  # junto com flutter_background_service e upgrade do Flutter SDK.

  # Notificações locais (disparo de triggers ao entrar no geofence)
  flutter_local_notifications: ^18.0.1

  # Foreground service que mantém o processo vivo quando o app é minimizado,
  # permitindo que o GPS e o geofencing continuem funcionando em segundo plano.
  flutter_background_service: ^5.0.0

  # BLE Social: implementado 100% via MethodChannel + EventChannel nativo (MainActivity.kt).
  # flutter_blue_plus removido: flutter_blue_plus_android 9.0.3 incompatível com Flutter 3.24.5.
  # Scan via EventChannel "com.sopro.sopro/ble_scan", GATT via MethodChannel "com.sopro.sopro/ble".

  # Seleção de foto de perfil da galeria do dispositivo
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Gerador de codigo do Drift (tabelas, DAOs, etc.)
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

  # Gerador do ícone do app para Android (executa via 'dart run flutter_launcher_icons')
  flutter_launcher_icons: ^0.14.4

# Configuração do gerador de ícones — lê assets/icon/icon.png e gera os mipmap-*
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_channel_ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/icon/