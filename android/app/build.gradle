plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.sopro.sopro"
    compileSdk = 35
    // NDK 28+ exigido por plugins nativos (maplibre_gl) sob AGP 8.6.
    ndkVersion = "28.2.13676358"

    compileOptions {
        // Desugaring exigido por flutter_local_notifications sob AGP 8.6.
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.sopro.sopro"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // minSdk 29 exigido por ACCESS_BACKGROUND_LOCATION e foreground service type "location"
        // que são necessários para o geofence_service funcionar em segundo plano
        minSdk = 29
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildFeatures {
        buildConfig = true
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Core library desugaring — backport de APIs Java 8+ exigido por
    // flutter_local_notifications no toolchain AGP 8.6.
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    // FusedLocationProviderClient para GPS eficiente em bateria.
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    // Coroutines para chamadas de rede fora da main thread no FloatingVoiceService
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    // WorkManager — necessário para FloatingVoiceService agendar tarefas Dart via Drift.
    // O plugin Flutter workmanager ^0.5.x adiciona work-runtime como dependência interna,
    // mas o app module precisa declarar explicitamente para o compilador Kotlin resolver
    // androidx.work.* no FloatingVoiceService.kt.
    implementation 'androidx.work:work-runtime-ktx:2.9.1'
}
